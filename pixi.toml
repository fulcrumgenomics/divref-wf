[workspace]
authors = ["Fulcrum Genomics"]
channels = ["conda-forge", "bioconda"]
name = "fg-labs-divref-wf"
platforms = ["osx-arm64", "osx-64", "linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12.8,<3.13"
openjdk = ">=11,<17"

[pypi-dependencies]
divref = { path = "./divref", editable = true }

[feature.workflow.dependencies]
snakemake-minimal = ">=8.28.0,<9.0"
snakefmt = ">=1.0.0,<2"
bcftools = ">=1.23.1,<2"
awscli = ">=2,<3"

[feature.analysis.dependencies]
r-base = "==4.5.3"
r-optparse = ">=1.7.5,<2"
r-tidyverse = ">=2.0.0,<3"
r-logger = ">=0.4.1,<0.5"

[environments]
default = { features = ["workflow"] }
analysis = { features = ["workflow", "analysis"] }

[tasks]
check-toolkit = "uv run --directory divref poe check-all"
fix-and-check-toolkit = "uv run --directory divref poe fix-and-check-all"

check-lock   = "pixi lock --check"

check-all = [
    { task = "check-toolkit" },
    { task = "check-lock" },
]

fix-and-check-all = [
    { task = "fix-and-check-toolkit" },
    { task = "check-lock" },
]

setup-r-packages = """
Rscript -e "install.packages(c('duckdb', 'duckplyr', 'eulerr'), repos = 'https://cloud.r-project.org')"
"""

setup-gcs = """
python -c "
import os, urllib.request, zipfile, hashlib
jars_dir = os.path.join(__import__('pyspark').__path__[0], 'jars')
artifacts = [
    (
        'gcs-connector.jar',
        'https://repo1.maven.org/maven2/com/google/cloud/bigdataoss/gcs-connector/hadoop3-2.2.22/gcs-connector-hadoop3-2.2.22-shaded.jar',
        'd53cd19ec2fadc3f81319a1dcf3f70940915a674781c29a7067ea6021ae8dfe2',
    ),
]
for name, url, expected_sha256 in artifacts:
    jar = os.path.join(jars_dir, name)
    valid = False
    if os.path.exists(jar):
        try:
            with zipfile.ZipFile(jar):
                pass
            with open(jar, 'rb') as handle:
                valid = hashlib.sha256(handle.read()).hexdigest() == expected_sha256
        except zipfile.BadZipFile:
            pass
    if not valid:
        tmp = jar + '.tmp'
        print(f'Downloading {name} to {jar}...')
        urllib.request.urlretrieve(url, tmp)
        try:
            digest = hashlib.sha256(open(tmp, 'rb').read()).hexdigest()
            if digest != expected_sha256:
                raise RuntimeError(f'Checksum mismatch for {jar}: {digest}')
            os.replace(tmp, jar)
        except BaseException:
            if os.path.exists(tmp):
                os.remove(tmp)
            raise
        print('Done.')
    else:
        print(f'{name} is already valid.')
"
"""

setup-s3 = """
python -c "
import os, urllib.request, zipfile, hashlib
jars_dir = os.path.join(__import__('pyspark').__path__[0], 'jars')
artifacts = [
    (
        'hadoop-aws.jar',
        'https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar',
        '53f9ae03c681a30a50aa17524bd9790ab596b28481858e54efd989a826ed3a4a',
    ),
    (
        'aws-java-sdk-bundle.jar',
        'https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar',
        '873fe7cf495126619997bec21c44de5d992544aea7e632fdc77adb1a0915bae5',
    ),
]
for name, url, expected_sha256 in artifacts:
    jar = os.path.join(jars_dir, name)
    valid = False
    if os.path.exists(jar):
        try:
            with zipfile.ZipFile(jar):
                pass
            with open(jar, 'rb') as handle:
                valid = hashlib.sha256(handle.read()).hexdigest() == expected_sha256
        except zipfile.BadZipFile:
            pass
    if not valid:
        tmp = jar + '.tmp'
        print(f'Downloading {name} to {jar}...')
        urllib.request.urlretrieve(url, tmp)
        try:
            digest = hashlib.sha256(open(tmp, 'rb').read()).hexdigest()
            if digest != expected_sha256:
                raise RuntimeError(f'Checksum mismatch for {jar}: {digest}')
            os.replace(tmp, jar)
        except BaseException:
            if os.path.exists(tmp):
                os.remove(tmp)
            raise
        print('Done.')
    else:
        print(f'{name} is already valid.')
"
"""

setup-cloud = [{ task = "setup-gcs" }, { task = "setup-s3" }]

lint = "snakefmt --line-length 100 workflows/*.smk"
