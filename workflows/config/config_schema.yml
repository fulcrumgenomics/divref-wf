$schema: "https://json-schema.org/draft/2020-12/schema"
description: Configuration schema for generate_divref.smk

type: object
additionalProperties: false

properties:
  cloud:
    type: string
    enum: ["GCS", "AWS"]
    description: |
      Cloud provider hosting all input URIs. The workflow validates that every cloud URI
      (`reference_genome_uri`, `hgdp_1kg_phased_bcf_prefix`,
      `hgdp_1kg_variant_annotation_hail_table`, `hgdp_1kg_sample_metadata_hail_table`)
      uses a scheme matching this value (`gs://` for `GCS`; `s3://` or `s3a://` for `AWS`).
      Also drives the cloud selected for `gnomad_variant_annotation_source`.

  reference_genome_uri:
    type: string
    description: |
      URI for the reference genome FASTA. Both `gs://` and `s3://` are supported; the rule
      detects the scheme. The default is a gzipped FASTA on GCS; the S3 alternative is the
      uncompressed `s3://broad-references/hg38/v0/Homo_sapiens_assembly38.fasta` on AWS Open Data.
    default: gs://hail-common/references/Homo_sapiens_assembly38.fasta.gz

  reference_genome_base_name:
    type: string
    description: Base name for the reference genome.
    default: Homo_sapiens_assembly38

  chromosomes:
    type: array
    items:
      type: string
    minItems: 1
    uniqueItems: true
    description: |
      List of chromosomes to generate the resource for. Haplotypes are only computed for autosomes
      (chr1-chr22); chrX and chrY, if listed, contribute gnomAD single variants only.
    default: ["chr1", "chr2", "chr3", "chr4", "chr5", "chr6", "chr7", "chr8", "chr9", "chr10", "chr11", "chr12", "chr13", "chr14", "chr15", "chr16", "chr17", "chr18", "chr19", "chr20", "chr21", "chr22", "chrX", "chrY"]

  hgdp_1kg_populations:
    type: array
    items:
      type: string
    minItems: 1
    uniqueItems: true
    description: List of populations to use when generating haplotypes from HGDP+1KG data.
    default: ["afr", "amr", "eas", "sas", "nfe"]

  hgdp_1kg_phased_bcf_prefix:
    type: string
    description: |
      Prefix of the URI for the HGDP+1KG phased BCF files. Both `gs://` and `s3://` are supported;
      bcftools reads either via the underlying HTSlib plugins. S3 alternative:
      `s3://gnomad-public-us-east-1/resources/hgdp_1kg/phased_haplotypes_v2/hgdp1kgp_`.
    default: "gs://gcp-public-data--gnomad/resources/hgdp_1kg/phased_haplotypes_v2/hgdp1kgp_"

  hgdp_1kg_phased_bcf_suffix:
    type: string
    description: Suffix of the URI for the HGDP+1KG phased BCF files (used for both `gs://` and `s3://`).
    default: ".filtered.SNV_INDEL.phased.shapeit5.bcf"

  hgdp_1kg_phased_bcf_chrX:
    type: object
    additionalProperties: false
    description: |
      URIs for the three HGDP+1KG phased chrX BCFs (PAR1, non-PAR, PAR2). chrX does not
      follow the autosome `{prefix}{chrom}{suffix}` pattern because non-PAR uses the
      shapeit5 rare-variant track while PAR1 and PAR2 use the common-variant track. Both
      `gs://` and `s3://` are supported; the scheme must match the workflow-level `cloud`.
      Defaults point to the GCS public-data bucket; S3 alternatives are at
      `s3://gnomad-public-us-east-1/resources/hgdp_1kg/phased_haplotypes_v2/` with the
      same basenames.
    properties:
      par1:
        type: string
        description: URI of the chrX PAR1 phased BCF.
      non_par:
        type: string
        description: URI of the chrX non-PAR phased BCF.
      par2:
        type: string
        description: URI of the chrX PAR2 phased BCF.
    required:
      - par1
      - non_par
      - par2
    default:
      par1: "gs://gcp-public-data--gnomad/resources/hgdp_1kg/phased_haplotypes_v2/hgdp1kgp_chrX_par1.shapeit5_common.bcf"
      non_par: "gs://gcp-public-data--gnomad/resources/hgdp_1kg/phased_haplotypes_v2/hgdp1kgp_chrX_non_par.full.shapeit5_rare.bcf"
      par2: "gs://gcp-public-data--gnomad/resources/hgdp_1kg/phased_haplotypes_v2/hgdp1kgp_chrX_par2.shapeit5_common.bcf"

  hgdp_1kg_variant_annotation_hail_table:
    type: string
    description: |
      URI to the HGDP+1KG gnomAD variant annotations Hail table. Both `gs://` and `s3a://` are
      supported. S3 alternative:
      `s3a://gnomad-public-us-east-1/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.hgdp_1kg_subset_variant_annotations.ht`.
    default: "gs://gcp-public-data--gnomad/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.hgdp_1kg_subset_variant_annotations.ht"

  hgdp_1kg_sample_metadata_hail_table:
    type: string
    description: |
      URI to the HGDP+1KG gnomAD sample metadata Hail table. Both `gs://` and `s3a://` are
      supported. S3 alternative:
      `s3a://gnomad-public-us-east-1/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.hgdp_1kg_subset_sample_meta.ht`.
    default: "gs://gcp-public-data--gnomad/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.hgdp_1kg_subset_sample_meta.ht"

  hgdp_1kg_min_pop_variant_allele_freq:
    type: number
    minimum: 0
    maximum: 1
    description: |
      Minimum variant allele frequency for at least one selected population when running
      `divref extract-gnomad-afs` and `divref compute-haplotypes`.
    default: 0.005

  hgdp_1kg_min_estimated_gnomad_haplotype_allele_freq:
    type: number
    minimum: 0
    maximum: 1
    description: |
      Minimum estimated gnomAD haplotype allele frequency for inclusion in output. Used by
      `divref compute-haplotypes`.
    default: 0.005

  gnomad_variant_annotation_source:
    type: string
    enum: ["JOINT_41", "GENOMES_312", "HGDP_1KG_312"]
    description: |
      Source of the gnomAD variant annotations Hail table. Supported options:
      JOINT_41 = v4.1 joint exomes (730K) + genomes (76K)
        s3a://gnomad-public-us-east-1/release/4.1/ht/joint/gnomad.joint.v4.1.sites.ht
        gs://gcp-public-data--gnomad/release/4.1/ht/joint/gnomad.joint.v4.1.sites.ht
      GENOMES_312 = v3.1.2 genomes (76K)
        s3a://gnomad-public-us-east-1/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.sites.ht
        gs://gcp-public-data--gnomad/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.sites.ht
      HGDP_1KG_312 = v3.1.2 HGDP+1KG subset genomes (4K, uses frequencies from genomes 76K)
        s3a://gnomad-public-us-east-1/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.hgdp_1kg_subset_variant_annotations.ht
        gs://gcp-public-data--gnomad/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.hgdp_1kg_subset_variant_annotations.ht
      The cloud provider is selected via the workflow-level `cloud` field.
    default: "JOINT_41"

  gnomad_variant_min_pop_variant_allele_freq:
    type: number
    minimum: 0
    maximum: 1
    description: |
      Minimum variant allele frequency for at least one selected population when running
      `divref extract-gnomad-single-afs`.
    default: 0.005

  gnomad_variant_populations:
    type: array
    items:
      type: string
    minItems: 1
    uniqueItems: true
    description: List of populations to use when selecting single variants from gnomAD data.
    default: ["afr", "amr", "eas", "sas", "nfe"]

  sequence_window_size:
    type: integer
    description: |
      Window size used when generating haplotypes; used as the context size when constructing
      sequence strings and stored in the index.
    minimum: 1
    default: 25

  version:
    type: string
    description: Version identifier for output resource.
    default: "2.0"

  polars_chunk_size:
    type: integer
    minimum: 10000
    description: |
      Number of sequence table rows to read from intermediate TSV file and insert into database at a
      time. Recommended maximum 1,000,000 for typical laptop.
    default: 100000

  haplotype_min_partitions:
    type: integer
    minimum: 1
    description: |
      Minimum partitions for `import_vcf` in `divref compute-haplotypes`. Higher values give finer
      per-task granularity in the entries->blocks shuffle, lowering per-task heap on dense
      chromosomes at the cost of more task-scheduling overhead.
    default: 64

  work_dir:
    type: string
    description: Path to the working directory for intermediate files.
    default: data/work

  tmp_dir:
    type: string
    description: Path to the temporary files directory.
    default: /tmp

  gcs_credentials_path:
    type: string
    description: |
      Absolute path to a GCP Application Default Credentials JSON file. Used by the Hail-based
      tools when `cloud` is `GCS`; ignored when `cloud` is `AWS`.
    default: "~/.config/gcloud/application_default_credentials.json"

  spark_driver_memory_gb:
    type: integer
    minimum: 1
    description: |
      Memory in GB to allocate to the Spark driver for Hail-using divref tools (e.g.
      `extract-gnomad-afs`, `compute-haplotypes`, `append-contig-to-duckdb-index`).
    default: 24

  spark_executor_memory_gb:
    type: integer
    minimum: 1
    description: |
      Memory in GB to allocate to the Spark executor for Hail-using divref tools. (e.g.
      `extract-gnomad-afs`, `compute-haplotypes`, `append-contig-to-duckdb-index`).
    default: 24

required:
  - cloud
